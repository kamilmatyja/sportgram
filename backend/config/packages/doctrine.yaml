doctrine:
  dbal:
    url: '%env(resolve:DATABASE_URL)%'
    driver: 'pdo_pgsql'
    server_version: '18'
    charset: utf8
  orm:
    validate_xml_mapping: false
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    auto_mapping: true
    mappings:
      App:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Entity'
        prefix: 'App\Entity'
        alias: App
    filters:
      soft_delete:
        class: App\Doctrine\Filter\SoftDeleteFilter
        enabled: true
