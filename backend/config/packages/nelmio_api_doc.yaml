nelmio_api_doc:
  documentation:
    info:
      title: Sportgram API
      description: API documentation for Sportgram
      version: 1.0.0
    components:
      securitySchemes:
        Bearer:
          type: http
          scheme: bearer
          bearerFormat: JWT

  areas:
    default:
      path_patterns:
        - ^/

  models:
    use_jms: false
    names:
      - { alias: UserResource, type: App\Resource\UserResource }
      - { alias: UserDisciplineResource, type: App\Resource\UserDisciplineResource }
      - { alias: UserRoleResource, type: App\Resource\UserRoleResource }
      - { alias: StoryResource, type: App\Resource\StoryResource }
      - { alias: PushSubscriptionResource, type: App\Resource\PushSubscriptionResource }
      - { alias: NotificationResource, type: App\Resource\NotificationResource }
      - { alias: FriendResource, type: App\Resource\FriendResource }
      - { alias: ConversationActivityResource, type: App\Resource\ConversationActivityResource }
      - { alias: ConversationResource, type: App\Resource\ConversationResource }
      - { alias: EntryResource, type: App\Resource\EntryResource }
      - { alias: GoalResource, type: App\Resource\GoalResource }
      - { alias: GoalParticipantResource, type: App\Resource\GoalParticipantResource }
      - { alias: GoalParticipantResultResource, type: App\Resource\GoalParticipantResultResource }
      - { alias: FeedResource, type: App\Resource\FeedResource }
      - { alias: FeedCommentResource, type: App\Resource\FeedCommentResource }
      - { alias: FeedReactionResource, type: App\Resource\FeedReactionResource }
      - { alias: PageResource, type: App\Resource\PageResource }
      - { alias: PageFollowResource, type: App\Resource\PageFollowResource }
      - { alias: PageParticipantResource, type: App\Resource\PageParticipantResource }