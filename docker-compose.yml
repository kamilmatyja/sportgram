services:
  postgres:
    image: postgres:18.3
    container_name: sportgram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportgram
      POSTGRES_USER: sportgram
      POSTGRES_PASSWORD: sportgram
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  php:
    build:
      context: .
      dockerfile: infra/php/Dockerfile
    container_name: sportgram-php
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - postgres

  nginx:
    image: nginx:1.28-alpine
    container_name: sportgram-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  pg_data:
